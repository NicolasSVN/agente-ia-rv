<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Central de Custos - Agente IA - RV</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/static/tailwind.config.js"></script>
    <link rel="stylesheet" href="/static/global.css">
    <link rel="stylesheet" crossorigin href="/custos/assets/{{ css_file }}">
    <style>
        html, body {
            height: 100%;
            overflow: hidden;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        
        .app-layout {
            display: flex;
            height: 100vh;
        }
        
        .main-content {
            flex: 1;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: margin-left 0.3s ease;
            background: #FFF8F3;
        }
        
        #root {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            width: 100%;
            height: 100%;
        }
        
        #svn-sidebar {
            overflow-y: auto;
            overflow-x: hidden;
        }
    </style>
</head>
<body>
    <div class="app-layout">
        {% include '_sidebar.html' %}

        <main class="main-content" id="mainContent" style="margin-left: 260px;">
            <div id="root"></div>
        </main>
    </div>

    <script type="module" crossorigin src="/custos/assets/{{ js_file }}"></script>
</body>
</html>
