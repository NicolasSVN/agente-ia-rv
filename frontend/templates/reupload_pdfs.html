<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <link rel="apple-touch-icon" sizes="180x180" href="/static/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/static/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/static/favicon-16x16.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Re-upload de PDFs - Agente IA - RV</title>
    <script nonce="{{ request.state.csp_nonce }}" src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/global.css">
    <script nonce="{{ request.state.csp_nonce }}" src="/static/notifications.js?v={{ now().timestamp() if now else 1706371200 }}"></script>
    <style>
        .upload-row { transition: all 0.3s ease; }
        .upload-row.uploaded { background-color: #f0fdf4; }
        .upload-row.uploading { opacity: 0.6; pointer-events: none; }
        .upload-row.error { background-color: #fef2f2; }
        .badge { display: inline-block; padding: 2px 10px; border-radius: 12px; font-size: 0.75rem; font-weight: 500; }
        .badge-research { background: #dbeafe; color: #1e40af; }
        .badge-smart_upload { background: #fef3c7; color: #92400e; }
        .badge-campanha { background: #ede9fe; color: #5b21b6; }
        .badge-apresentacao { background: #dcfce7; color: #166534; }
        .badge-default { background: #f3f4f6; color: #374151; }
        .progress-bar { height: 3px; background: #3b82f6; transition: width 0.3s; }
        .drop-zone { border: 2px dashed #d1d5db; transition: all 0.2s; }
        .drop-zone.drag-over { border-color: #3b82f6; background: #eff6ff; }
        .status-icon { width: 20px; height: 20px; display: inline-flex; align-items: center; justify-content: center; }
    </style>
</head>
<body class="bg-gray-50 font-sans">
    {% include '_sidebar.html' %}

    <main id="main-content" style="margin-left: 260px; transition: margin-left 0.3s;" class="min-h-screen p-8">
        <div class="max-w-5xl mx-auto">
            <div class="flex items-center justify-between mb-6">
                <div>
                    <h1 class="text-2xl font-bold text-gray-800">Re-upload de PDFs</h1>
                    <p class="text-gray-500 mt-1">Materiais que perderam o arquivo PDF na migração. Envie o PDF para reativar o envio via WhatsApp.</p>
                </div>
                <div id="stats" class="text-right">
                    <div class="text-3xl font-bold text-red-500" id="count-missing">—</div>
                    <div class="text-sm text-gray-500">PDFs pendentes</div>
                </div>
            </div>

            <div id="loading" class="text-center py-12 text-gray-400">
                <svg class="animate-spin h-8 w-8 mx-auto mb-3 text-gray-300" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
                </svg>
                Carregando materiais...
            </div>

            <div id="all-done" class="hidden text-center py-16">
                <div class="text-5xl mb-4">&#10003;</div>
                <h2 class="text-xl font-semibold text-green-700">Todos os materiais possuem PDF!</h2>
                <p class="text-gray-500 mt-2">Nenhum re-upload necessário.</p>
            </div>

            <div id="materials-table" class="hidden bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
                <table class="w-full">
                    <thead class="bg-gray-50 border-b border-gray-200">
                        <tr>
                            <th class="px-4 py-3 text-left text-xs font-semibold text-gray-500 uppercase">ID</th>
                            <th class="px-4 py-3 text-left text-xs font-semibold text-gray-500 uppercase">Ticker</th>
                            <th class="px-4 py-3 text-left text-xs font-semibold text-gray-500 uppercase">Material</th>
                            <th class="px-4 py-3 text-left text-xs font-semibold text-gray-500 uppercase">Tipo</th>
                            <th class="px-4 py-3 text-left text-xs font-semibold text-gray-500 uppercase">Ação</th>
                            <th class="px-4 py-3 text-left text-xs font-semibold text-gray-500 uppercase">Status</th>
                        </tr>
                    </thead>
                    <tbody id="materials-body"></tbody>
                </table>
            </div>
        </div>
    </main>

    <script nonce="{{ request.state.csp_nonce }}">
        const API_BASE = '/api/products';

        function getBadgeClass(type) {
            const map = { research: 'badge-research', smart_upload: 'badge-smart_upload', campanha: 'badge-campanha', apresentacao: 'badge-apresentacao' };
            return map[type] || 'badge-default';
        }

        function formatFileSize(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
            return (bytes / 1048576).toFixed(1) + ' MB';
        }

        async function loadMaterials() {
            try {
                const res = await fetch(`${API_BASE}/admin/all-materials-without-pdf`);
                if (res.status === 401) { window.location.href = '/login'; return; }
                const data = await res.json();

                document.getElementById('loading').classList.add('hidden');
                document.getElementById('count-missing').textContent = data.without_pdf;

                if (data.without_pdf === 0) {
                    document.getElementById('all-done').classList.remove('hidden');
                    document.getElementById('count-missing').classList.remove('text-red-500');
                    document.getElementById('count-missing').classList.add('text-green-500');
                    return;
                }

                const tbody = document.getElementById('materials-body');
                tbody.innerHTML = '';

                data.materials.forEach(m => {
                    const tr = document.createElement('tr');
                    tr.className = 'upload-row border-b border-gray-100 hover:bg-gray-50';
                    tr.id = `row-${m.material_id}`;
                    tr.innerHTML = `
                        <td class="px-4 py-3 text-sm text-gray-500 font-mono">${m.material_id}</td>
                        <td class="px-4 py-3 text-sm font-semibold text-gray-800">${m.ticker || '—'}</td>
                        <td class="px-4 py-3">
                            <div class="text-sm font-medium text-gray-800">${m.material_name}</div>
                            <div class="text-xs text-gray-400">${m.product_name}</div>
                        </td>
                        <td class="px-4 py-3"><span class="badge ${getBadgeClass(m.material_type)}">${m.material_type}</span></td>
                        <td class="px-4 py-3">
                            <label class="drop-zone rounded-lg px-3 py-2 cursor-pointer flex items-center gap-2 text-sm text-gray-500 hover:text-blue-600 hover:border-blue-300"
                                   id="dropzone-${m.material_id}"
                                   ondragover="event.preventDefault(); this.classList.add('drag-over')"
                                   ondragleave="this.classList.remove('drag-over')"
                                   ondrop="handleDrop(event, ${m.material_id})">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path>
                                </svg>
                                <span id="label-${m.material_id}">Selecionar PDF</span>
                                <input type="file" accept=".pdf" class="hidden" onchange="handleFile(this, ${m.material_id})">
                            </label>
                            <div class="mt-1 h-1 rounded overflow-hidden hidden" id="progress-wrap-${m.material_id}">
                                <div class="progress-bar rounded" id="progress-${m.material_id}" style="width: 0%"></div>
                            </div>
                        </td>
                        <td class="px-4 py-3" id="status-${m.material_id}">
                            <span class="text-xs text-gray-400">Pendente</span>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });

                document.getElementById('materials-table').classList.remove('hidden');
            } catch (err) {
                document.getElementById('loading').textContent = 'Erro ao carregar materiais: ' + err.message;
            }
        }

        function handleDrop(event, materialId) {
            event.preventDefault();
            const dropzone = document.getElementById(`dropzone-${materialId}`);
            dropzone.classList.remove('drag-over');
            const file = event.dataTransfer.files[0];
            if (file && file.name.toLowerCase().endsWith('.pdf')) {
                uploadFile(file, materialId);
            } else {
                showStatus(materialId, 'Apenas PDF', 'error');
            }
        }

        function handleFile(input, materialId) {
            const file = input.files[0];
            if (file) uploadFile(file, materialId);
        }

        async function uploadFile(file, materialId) {
            const row = document.getElementById(`row-${materialId}`);
            const label = document.getElementById(`label-${materialId}`);
            const progressWrap = document.getElementById(`progress-wrap-${materialId}`);
            const progress = document.getElementById(`progress-${materialId}`);

            row.classList.add('uploading');
            row.classList.remove('error', 'uploaded');
            label.textContent = file.name;
            progressWrap.classList.remove('hidden');
            progress.style.width = '30%';

            const formData = new FormData();
            formData.append('file', file);

            try {
                progress.style.width = '60%';
                const res = await fetch(`${API_BASE}/admin/reupload-pdf/${materialId}`, {
                    method: 'POST',
                    body: formData
                });
                progress.style.width = '90%';

                if (!res.ok) {
                    const err = await res.json();
                    throw new Error(err.detail || 'Erro no upload');
                }

                const data = await res.json();
                progress.style.width = '100%';

                row.classList.remove('uploading');
                row.classList.add('uploaded');
                showStatus(materialId, `${formatFileSize(data.file_size)}`, 'success');

                const count = document.getElementById('count-missing');
                const current = parseInt(count.textContent) || 0;
                if (current > 0) count.textContent = current - 1;
                if (current - 1 === 0) {
                    count.classList.remove('text-red-500');
                    count.classList.add('text-green-500');
                }

                if (window.showNotification) {
                    showNotification(`PDF de ${data.material_name} enviado com sucesso!`, 'success');
                }
            } catch (err) {
                row.classList.remove('uploading');
                row.classList.add('error');
                showStatus(materialId, err.message, 'error');
                progress.style.width = '0%';
                progressWrap.classList.add('hidden');
            }
        }

        function showStatus(materialId, text, type) {
            const el = document.getElementById(`status-${materialId}`);
            if (type === 'success') {
                el.innerHTML = `<span class="inline-flex items-center gap-1 text-xs text-green-600 font-medium">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
                    ${text}
                </span>`;
            } else {
                el.innerHTML = `<span class="text-xs text-red-500 font-medium">${text}</span>`;
            }
        }

        loadMaterials();
    </script>
</body>
</html>
