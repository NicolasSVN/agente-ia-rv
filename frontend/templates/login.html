<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Agente IA - RV</title>
    <link rel="stylesheet" href="/static/global.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: var(--bg-color);
        }
        
        .login-container {
            background: var(--card-bg);
            padding: 48px;
            border-radius: 20px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
            width: 100%;
            max-width: 420px;
            border: 1px solid var(--border-color);
        }
        
        .logo {
            text-align: center;
            margin-bottom: 36px;
        }
        
        .logo img {
            height: 52px;
            margin-bottom: 16px;
        }
        
        .logo h1 {
            color: var(--text-primary);
            font-size: 1.75rem;
            font-weight: 700;
        }
        
        .logo p {
            color: var(--text-secondary);
            font-size: 0.95rem;
            margin-top: 8px;
        }
        
        .error-message {
            background: #fef2f2;
            border: 1px solid #fecaca;
            color: #991b1b;
            padding: 14px 18px;
            border-radius: 10px;
            margin-bottom: 24px;
            font-size: 0.9rem;
            display: none;
        }
        
        .error-message.show {
            display: block;
        }
        
        .footer {
            text-align: center;
            margin-top: 28px;
            color: var(--text-secondary);
            font-size: 0.85rem;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <img src="/static/logo.png" alt="SVN">
            <h1>Agente IA - RV</h1>
            <p>Painel Administrativo</p>
        </div>
        
        <div class="error-message" id="error-message">
            Usuário ou senha incorretos. Tente novamente.
        </div>
        
        <div id="microsoft-login-container" style="margin-bottom: 24px;">
            <a href="/api/auth/microsoft/login" class="btn-microsoft" style="display: flex; align-items: center; justify-content: center; gap: 12px; width: 100%; padding: 14px; font-size: 1rem; background: #fff; border: 1px solid #8c8c8c; border-radius: 8px; color: #5e5e5e; text-decoration: none; font-weight: 500; transition: all 0.2s ease;">
                <svg xmlns="http://www.w3.org/2000/svg" width="21" height="21" viewBox="0 0 21 21">
                    <rect x="1" y="1" width="9" height="9" fill="#f25022"/>
                    <rect x="11" y="1" width="9" height="9" fill="#7fba00"/>
                    <rect x="1" y="11" width="9" height="9" fill="#00a4ef"/>
                    <rect x="11" y="11" width="9" height="9" fill="#ffb900"/>
                </svg>
                Entrar com Microsoft
            </a>
            
            <div style="display: flex; align-items: center; margin: 20px 0; gap: 12px;">
                <div style="flex: 1; height: 1px; background: var(--border-color);"></div>
                <span style="color: var(--text-secondary); font-size: 0.85rem;">ou</span>
                <div style="flex: 1; height: 1px; background: var(--border-color);"></div>
            </div>
        </div>
        
        <form action="/api/auth/login-form" method="POST">
            <div class="form-group">
                <label class="form-label" for="username">Usuário</label>
                <input type="text" class="form-input" id="username" name="username" required autocomplete="username">
            </div>
            
            <div class="form-group">
                <label class="form-label" for="password">Senha</label>
                <input type="password" class="form-input" id="password" name="password" required autocomplete="current-password">
            </div>
            
            <button type="submit" class="btn btn-primary" style="width: 100%; padding: 14px; font-size: 1rem;">Entrar</button>
        </form>
        
        <div class="footer">
            Acesso restrito a administradores e assessores
        </div>
    </div>
    
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.has('error')) {
            const errorEl = document.getElementById('error-message');
            const errorType = urlParams.get('error');
            
            if (errorType === 'permission') {
                errorEl.textContent = 'Você não tem permissão para acessar o painel.';
            } else if (errorType === 'microsoft') {
                const detail = urlParams.get('detail') || 'Erro na autenticação com Microsoft';
                errorEl.textContent = detail;
            }
            errorEl.classList.add('show');
        }
        
    </script>
</body>
</html>
