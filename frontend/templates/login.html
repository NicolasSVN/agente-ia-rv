<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <link rel="apple-touch-icon" sizes="180x180" href="/static/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/static/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/static/favicon-16x16.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Agente IA - RV</title>
    <link rel="stylesheet" href="/static/global.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: var(--bg-color);
        }
        
        .login-container {
            background: var(--card-bg);
            padding: 48px;
            border-radius: 20px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
            width: 100%;
            max-width: 420px;
            border: 1px solid var(--border-color);
        }
        
        .logo {
            text-align: center;
            margin-bottom: 36px;
        }
        
        .logo img {
            height: 52px;
            margin-bottom: 16px;
        }
        
        .logo h1 {
            color: var(--text-primary);
            font-size: 1.75rem;
            font-weight: 700;
        }
        
        .logo p {
            color: var(--text-secondary);
            font-size: 0.95rem;
            margin-top: 8px;
        }
        
        .error-message {
            background: #fef2f2;
            border: 1px solid #fecaca;
            color: #991b1b;
            padding: 14px 18px;
            border-radius: 10px;
            margin-bottom: 24px;
            font-size: 0.9rem;
            display: none;
        }
        
        .error-message.show {
            display: block;
        }
        
        .footer {
            text-align: center;
            margin-top: 28px;
            color: var(--text-secondary);
            font-size: 0.85rem;
        }
        
        .login-container .form-input,
        .login-container .btn-microsoft {
            width: 100%;
            box-sizing: border-box;
        }
        
        .login-container .form-group {
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <img src="/static/logo.png" alt="SVN">
            <h1>Agente IA - RV</h1>
            <p>Painel Administrativo</p>
        </div>
        
        <div class="error-message" id="error-message">
            Usuário ou senha incorretos. Tente novamente.
        </div>
        
        <div id="microsoft-login-container">
            <a href="/api/auth/microsoft/login" class="btn-microsoft" style="display: flex; align-items: center; justify-content: center; gap: 12px; width: 100%; padding: 14px; font-size: 1rem; background: #fff; border: 1px solid #8c8c8c; border-radius: 8px; color: #5e5e5e; text-decoration: none; font-weight: 500; transition: all 0.2s ease;">
                <svg xmlns="http://www.w3.org/2000/svg" width="21" height="21" viewBox="0 0 21 21">
                    <rect x="1" y="1" width="9" height="9" fill="#f25022"/>
                    <rect x="11" y="1" width="9" height="9" fill="#7fba00"/>
                    <rect x="1" y="11" width="9" height="9" fill="#00a4ef"/>
                    <rect x="11" y="11" width="9" height="9" fill="#ffb900"/>
                </svg>
                Entrar com Microsoft
            </a>
        </div>
        
        <div id="dev-login-container" style="margin-top: 16px; display: none;">
            <button id="dev-login-btn" onclick="handleDevLogin()" style="display: flex; align-items: center; justify-content: center; gap: 10px; width: 100%; padding: 14px; font-size: 0.95rem; background: #fef3c7; border: 1px solid #f59e0b; border-radius: 8px; color: #92400e; cursor: pointer; font-weight: 500; transition: all 0.2s ease; font-family: inherit;">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
                Acesso Dev
            </button>
            <div id="dev-token-form" style="display: none; margin-top: 12px;">
                <input type="password" id="dev-token-input" placeholder="Token de acesso" style="width: 100%; padding: 12px 14px; font-size: 0.95rem; border: 1px solid var(--border-color); border-radius: 8px; font-family: inherit; box-sizing: border-box;">
                <div id="dev-token-error" style="display: none; color: #991b1b; font-size: 0.85rem; margin-top: 8px;"></div>
                <button onclick="submitDevToken()" style="width: 100%; margin-top: 10px; padding: 12px; font-size: 0.95rem; background: #92400e; border: none; border-radius: 8px; color: #fff; cursor: pointer; font-weight: 500; font-family: inherit;">
                    Entrar
                </button>
            </div>
        </div>
        
        <div class="footer" style="margin-top: 28px;">
            Acesso restrito a administradores e assessores
        </div>
    </div>
    
    <script nonce="{{ request.state.csp_nonce }}">
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.has('error')) {
            const errorEl = document.getElementById('error-message');
            const errorType = urlParams.get('error');
            
            if (errorType === 'permission') {
                errorEl.textContent = 'Você não tem permissão para acessar o painel.';
            } else if (errorType === 'microsoft') {
                const detail = urlParams.get('detail') || 'Erro na autenticação com Microsoft';
                errorEl.textContent = detail;
            }
            errorEl.classList.add('show');
        }
        
        let isDevLocal = false;
        fetch('/api/auth/dev-login', {redirect: 'manual'}).then(r => {
            if (r.status !== 404) {
                document.getElementById('dev-login-container').style.display = 'block';
                if (r.type === 'opaqueredirect' || r.status === 302 || r.status === 200) {
                    isDevLocal = true;
                }
            }
        }).catch(() => {});
        
        function handleDevLogin() {
            if (isDevLocal) {
                window.location.href = '/api/auth/dev-login';
            } else {
                document.getElementById('dev-login-btn').style.display = 'none';
                document.getElementById('dev-token-form').style.display = 'block';
                document.getElementById('dev-token-input').focus();
            }
        }
        
        function submitDevToken() {
            const token = document.getElementById('dev-token-input').value.trim();
            const errorEl = document.getElementById('dev-token-error');
            if (!token) {
                errorEl.textContent = 'Informe o token de acesso.';
                errorEl.style.display = 'block';
                return;
            }
            errorEl.style.display = 'none';
            fetch('/api/auth/dev-login-verify', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({token: token})
            }).then(r => {
                if (r.ok) {
                    window.location.href = '/api/auth/dev-login';
                } else {
                    errorEl.textContent = 'Token inválido.';
                    errorEl.style.display = 'block';
                }
            }).catch(() => {
                errorEl.textContent = 'Erro de conexão.';
                errorEl.style.display = 'block';
            });
        }
        
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && document.getElementById('dev-token-form').style.display === 'block') {
                submitDevToken();
            }
        });
        
    </script>
</body>
</html>
